name: Update JGSA Data Daily

on:
  schedule:
    - cron: '30 1 * * *'  # 7:00 AM IST
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch live JGSA data
        run: |
          python scripts/fetch_live_jgsa.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jgsa_live_data.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update JGSA data $(date +'%Y-%m-%d %H:%M IST')" && git push)
